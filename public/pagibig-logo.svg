<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer orbital ring -->
  <circle cx="50" cy="50" r="48" fill="#1e3a8a" />
  <circle cx="50" cy="50" r="44" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.4"/>

  <!-- Gold center circle -->
  <circle cx="50" cy="50" r="30" fill="#f59e0b" />

  <!-- House icon (white) -->
  <path d="M50 28 L62 38 L62 52 L38 52 L38 38 Z" fill="#1e3a8a" opacity="0.9"/>
  <path d="M44 52 L44 44 L56 44 L56 52" fill="#f59e0b"/>
  <rect x="44" y="44" width="12" height="8" fill="#1e3a8a" opacity="0.6"/>

  <!-- Hands reaching up (simplified) -->
  <path d="M38 58 Q35 52 38 48 Q41 52 40 58 Z" fill="#1e3a8a" opacity="0.7"/>
  <path d="M62 58 Q65 52 62 48 Q59 52 60 58 Z" fill="#1e3a8a" opacity="0.7"/>

  <!-- Text: Pag-IBIG -->
  <text x="50" y="68" text-anchor="middle" fill="#1e3a8a" font-family="Arial,sans-serif" font-weight="900" font-size="8" letter-spacing="0.5">Pag-IBIG</text>
  <!-- Text: FUND -->
  <text x="50" y="76" text-anchor="middle" fill="#1e3a8a" font-family="Arial,sans-serif" font-weight="700" font-size="6" letter-spacing="1.5">FUND</text>

  <!-- Orbital dots -->
  <circle cx="50" cy="2" r="2.5" fill="#f59e0b"/>
  <circle cx="98" cy="50" r="2.5" fill="#60a5fa"/>
  <circle cx="50" cy="98" r="2.5" fill="#f59e0b"/>
  <circle cx="2" cy="50" r="2.5" fill="#60a5fa"/>
</svg>
